services:
    postgres:
        image: postgres:18
        container_name: sadra-postgres-local
        environment:
            POSTGRES_DB: sadra
            POSTGRES_USER: sadra
            POSTGRES_PASSWORD: sadra
            POSTGRES_HOST_AUTH_METHOD: trust
        ports:
            - 5432:5432
        volumes:
            - postgres_data:/var/lib/postgresql
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U sadra"]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - sadra-network

    pgadmin:
        image: dpage/pgadmin4:latest
        container_name: sadra-pgadmin
        environment:
            PGADMIN_DEFAULT_EMAIL: admin@example.com
            PGADMIN_DEFAULT_PASSWORD: admin_password
        ports:
            - 5050:80
        depends_on:
            - postgres
        networks:
            - sadra-network

volumes:
    postgres_data:
        driver: local

networks:
    sadra-network:
        driver: bridge
