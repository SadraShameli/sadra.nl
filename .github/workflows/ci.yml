name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    verify:
        name: Verify (format, lint, stylelint, typecheck, knip, tests)
        runs-on: ubuntu-latest
        env:
            FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest
            - name: Install dependencies
              run: bun install --frozen-lockfile
            - name: Generate Next.js type declarations
              run: printf '/// <reference types="next" />\n/// <reference types="next/image-types/global" />\n' > next-env.d.ts
            - name: Verify
              run: bun run verify

    e2e:
        name: Playwright E2E
        runs-on: ubuntu-latest
        env:
            FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest
            - name: Install dependencies
              run: bun install --frozen-lockfile
            - name: Install Playwright browsers
              run: bunx playwright install --with-deps chromium
            - name: Build
              run: bun run verify:build
            - name: Run Playwright
              run: bun run test:e2e
              env:
                  PLAYWRIGHT_BASE_URL: http://localhost:3000
